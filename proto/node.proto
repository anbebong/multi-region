syntax = "proto3";

package node;

option go_package = "github.com/anbebong/multi-region/proto";

// Envelope is the one and only unit of data the framework moves between a
// child and its parent. kind is opaque to the framework — it exists purely
// so the service built on top of this framework can distinguish what it put
// in payload ("log", "config", or anything else it invents later) without
// requiring any change to this proto or to the transport/node packages.
message Envelope {
  string id = 1;
  string kind = 2;
  bytes payload = 3;
  int64 timestamp = 4;
}

// StreamMessage carries an Envelope in exactly one direction on the shared
// bidirectional stream: upstream (child -> parent) or downstream
// (parent -> child). The framework forwards each direction recursively
// (upstream keeps going up if this node itself has a parent; downstream
// keeps going down to this node's own children) without inspecting kind.
message StreamMessage {
  oneof direction {
    Envelope upstream = 1;
    Envelope downstream = 2;
  }
}

service NodeService {
  rpc Stream(stream StreamMessage) returns (stream StreamMessage);
}
